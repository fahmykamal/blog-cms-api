services:
  mysql:
    image: mysql:8.0
    container_name: blogcms-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: blogcms
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./BlogCMS.Api
      dockerfile: Dockerfile
    container_name: blogcms-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: "Server=mysql;Database=blogcms;User=root;Password=${DB_PASSWORD:-root};"
      Jwt__Key: "${JWT_KEY:-SuperSecretKeyForBlogCMSAtLeast32CharsLong!}"
      Jwt__Issuer: "BlogCMS"
      Jwt__Audience: "BlogCMS.Client"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
